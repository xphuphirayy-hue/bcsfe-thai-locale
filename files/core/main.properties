welcome=
><@t>ยินดีต้อนรับสู่ <@s>Battle Cats Save File Editor</>!
>สร้างโดย <@s>fieryhenry</>
>
>Codeberg: <@s>https://codeberg.org/fieryhenry/BCSFE-Python</>
>Discord: <@s>{{discord_url}}</> - กรุณาแจ้งบั๊กที่ <@s>#bug-reports</> และข้อเสนอแนะที่ <@s>#suggestions</>
>บริจาค: <@s>https://ko-fi.com/fieryhenry</>
>
>ตำแหน่งไฟล์ตั้งค่า: <@s>{config_path}</>
>
>{theme_text}
>
>{locale_text}
>
><@q>ขอขอบคุณ:
>- <@s>Lethal's editor</> ที่เป็นแรงบันดาลใจและช่วยให้ผมคิดวิธีแพตช์ไฟล์เซฟและแก้ไข cf/xp ในตอนแรก: <@s>https://www.reddit.com/r/BattleCatsCheats/comments/djehhn/editoren/</>
>- โค้ดของ <@s>Beeven</> และ <@s>csehydrogen</> ที่ช่วยให้ผมเข้าใจวิธีแพตช์ไฟล์เซฟ: https://github.com/beeven/battlecats และ https://github.com/csehydrogen/BattleCatsHacker
>- ทุกคนที่สนับสนุนผลงานของผม เป็นแรงผลักดันให้ทำโปรเจกต์นี้และโปรเจกต์อื่นๆ ต่อไป: <@s>https://ko-fi.com/fieryhenry</>
>- ทุกคนในดิสคอร์ดที่ให้เซฟ แจ้งบั๊ก เสนอฟีเจอร์ใหม่ๆ และเป็นคอมมูนิตี้ที่ยอดเยี่ยม: <@s>{{discord_url}}</></>
>
><@w>หากคุณจ่ายเงินเพื่อโปรแกรมนี้ แสดงว่าคุณถูกหลอก โปรแกรมนี้ฟรีและเป็นโอเพนซอร์ส</>
>
><@w>ใช้เครื่องมือนี้โดยยอมรับความเสี่ยงด้วยตัวเอง ผมไม่รับผิดชอบต่อการถูกแบนหรือความเสียหายใดๆ ที่เกิดกับไฟล์เซฟของคุณ
>แน่นอนว่า save editor พยายามป้องกันไม่ให้เกิดเหตุการณ์เหล่านี้ แต่ผมไม่สามารถรับประกันได้ว่าเซฟของคุณจะปลอดภัย 100%
>หากเซฟของคุณเสียหาย ก็ยังขอให้แจ้งในดิสคอร์ดด้วย
>แนะนำให้สำรองไฟล์เซฟไว้ก่อนแก้ไขทุกครั้ง</>

