# เอกสารฉบับเต็ม: https://codeberg.org/fieryhenry/ExampleEditorLocale#format-of-the-properties-files
# การใส่สีข้อความ
#
# <@p> = สีหลัก (primary)
# <@s> = สีรอง (secondary)
# <@t> = สีที่สาม (tertiary)
# <@q> = สีที่สี่ (quaternary)
# <@e> = สีข้อผิดพลาด (error)
# <@w> = สีคำเตือน (warning)
# <@su> = สีสำเร็จ (success)
#
# </> = ปิดสีปัจจุบัน
# เมื่อใส่สี ให้ใช้แท็กด้านบน ไม่ใช่รหัสสี/ชื่อสีจริง เพื่อให้ใช้ได้กับหลายธีม
# ใช้รหัสสี/ชื่อสีจริงเฉพาะตอนที่สีนั้นมีความหมายสำคัญ เช่น การให้สีลูกแก้วพรสวรรค์เป้าหมายเป็นสีแดง
# หากต้องการพิมพ์ < หรือ > หรือ / ในข้อความ ให้ใส่ \ นำหน้า เช่น \< หรือ \> หรือ \/
#
# <#rrggbb> = สีจากรหัสเฮกซ์
#
# <w> = ขาว
# <bl> = ดำ
# <r> = แดง
# <g> = เขียว
# <b> = น้ำเงิน
# <y> = เหลือง
# <m> = ม่วงแดง
# <c> = ฟ้า
# <dy> = เหลืองเข้ม
# <dg> = เทาเข้ม
# <db> = น้ำเงินเข้ม
# <dc> = ฟ้าเข้ม
# <dm> = ม่วงแดงเข้ม
# <dr> = แดงเข้ม
# <dgn> = เขียวเข้ม
# <lg> = เทาอ่อน
# <o> = ส้ม

downloading=<@su>กำลังดาวน์โหลด <@s>{file_name}</> จาก <@s>{pack_name}</> เวอร์ชัน <@s>{version}</> รหัสประเทศ <@s>{country_code}</>
failed_to_download_game_data=<@e>ดาวน์โหลดข้อมูลเกม <@s>{file_name}</> จาก <@s>{pack_name}</> เวอร์ชัน <@s>{version}</> รหัสประเทศ <@s>{country_code}</> ไม่สำเร็จ ลิงก์: <@s>{url}</s> ลองตรวจสอบการเชื่อมต่ออินเทอร์เน็ตของคุณ</>
failed_to_get_game_versions=<@e>ไม่สามารถดึงข้อมูลเวอร์ชันเกมได้ ลองตรวจสอบการเชื่อมต่ออินเทอร์เน็ตของคุณ</>
no_device_error=<@e>ไม่พบอุปกรณ์ที่เชื่อมต่ออยู่</>
no_package_name_error=<@e>ไม่พบแพ็กเกจ Battle Cats อุปกรณ์ของคุณอาจยังไม่ได้ root หรือคุณอาจต้องลองใหม่และตรวจสอบว่าได้เปิดเข้าฐานแมวอย่างน้อยหนึ่งครั้งแล้ว</>
exit=ออก
tkinter_not_found=<@e>ไม่พบ tkinter หากคุณไม่ได้ใช้งานบนมือถือ กรุณาติดตั้งแล้วลองใหม่อีกครั้ง</>
tkinter_not_found_enter_path_file=กรุณากรอกที่อยู่/ตำแหน่งของไฟล์ {initialfile}:
tkinter_not_found_enter_path_file_save=กรุณากรอกที่อยู่/ตำแหน่งที่จะบันทึกไฟล์ {initialfile}:
